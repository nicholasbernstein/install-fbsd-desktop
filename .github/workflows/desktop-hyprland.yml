# Wayland compositor — push/PR + weekly.

name: Desktop / Hyprland

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: desktop-hyprland-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: Hyprland
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 150
