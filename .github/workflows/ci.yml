# Full CI: lint → all desktop smokes (all supported FreeBSD releases) + package
# build in parallel → GitHub Release only if every job succeeded and content changed.
#
# Triggers: every push, weekly schedule, PR, and manual dispatch.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Weekly Monday 06:00 UTC — full matrix
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell / script syntax
        run: |
          set -euo pipefail
          for f in installx.sh install.sh test_installx.sh scripts/build-freebsd-pkg.sh; do
            echo "==> bash -n $f"
            bash -n "$f"
          done
          python3 -m py_compile scripts/freebsd-supported-releases.py
          echo "syntax OK"

      - name: FreeBSD release matrix script
        run: |
          set -euo pipefail
          echo "==> live discovery"
          python3 scripts/freebsd-supported-releases.py --github-matrix
          echo "==> fallback-only"
          python3 scripts/freebsd-supported-releases.py --fallback-only --lines
          echo "==> pin"
          python3 scripts/freebsd-supported-releases.py --pin 14.4 --github-matrix

  # -------------------------------------------------------------------------
  # Desktop smokes — each reusable job expands across supported FreeBSD releases
  # -------------------------------------------------------------------------
  smoke-awesome:
    name: Desktop / awesome
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: awesome
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 120

  smoke-windowmaker:
    name: Desktop / WindowMaker
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: WindowMaker
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 120

  smoke-lxde:
    name: Desktop / LXDE
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: LXDE
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 120

  smoke-lxqt:
    name: Desktop / LXQT
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: LXQT
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 150

  smoke-xfce4:
    name: Desktop / Xfce4
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: Xfce4
      minimal_xorg: false
      mem: "8192"
      timeout_minutes: 150

  smoke-sway:
    name: Desktop / Sway
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: Sway
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 120

  smoke-hyprland:
    name: Desktop / Hyprland
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: Hyprland
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 150

  smoke-mate:
    name: Desktop / MATE
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: MATE
      minimal_xorg: false
      mem: "10240"
      timeout_minutes: 180

  smoke-cinnamon:
    name: Desktop / Cinnamon
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: Cinnamon
      minimal_xorg: false
      mem: "10240"
      timeout_minutes: 180

  smoke-kde:
    name: Desktop / KDE
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: KDE
      minimal_xorg: false
      mem: "12288"
      timeout_minutes: 180

  smoke-gnome:
    name: Desktop / GNOME
    needs: lint
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: GNOME
      minimal_xorg: false
      mem: "12288"
      timeout_minutes: 180

  # -------------------------------------------------------------------------
  # Package build (parallel with smokes; does not wait for them)
  # -------------------------------------------------------------------------
  package:
    name: Build FreeBSD package
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Build package in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
          copyback: true
          prepare: |
            set -e
            export ASSUME_ALWAYS_YES=yes
            export IGNORE_OSVERSION=yes
            pkg update -f
            pkg install -y pkg
          run: |
            set -e
            set -x
            cd "$GITHUB_WORKSPACE" 2>/dev/null || cd "$(pwd)"
            export INSTALLX_PKG_VERSION=0.2.0
            export INSTALLX_PKG_REVISION="$(echo "${GITHUB_SHA:-unknown}" | cut -c1-7)"
            sh scripts/build-freebsd-pkg.sh "$GITHUB_WORKSPACE/dist"
            ls -la dist
            cat dist/CONTENT_SHA256
            cat dist/SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-package-dist
          path: dist/
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Release only after ALL smokes + package succeed, and only if content changed
  # -------------------------------------------------------------------------
  release:
    name: Publish GitHub Release if content changed
    needs:
      - package
      - smoke-awesome
      - smoke-windowmaker
      - smoke-lxde
      - smoke-lxqt
      - smoke-xfce4
      - smoke-sway
      - smoke-hyprland
      - smoke-mate
      - smoke-cinnamon
      - smoke-kde
      - smoke-gnome
    runs-on: ubuntu-latest
    # Push / schedule / manual on default branch only (not PRs from forks)
    if: >
      success() &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'schedule' ||
       (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')))
    steps:
      - uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: freebsd-package-dist
          path: dist

      - name: Compare content checksum to latest release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NEW_SHA=$(tr -d ' \n' < dist/CONTENT_SHA256)
          echo "new_content_sha=${NEW_SHA}"
          echo "new_content_sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"

          OLD_SHA=""
          if gh release view latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            if gh release download latest --repo "${{ github.repository }}" \
                 --pattern 'CONTENT_SHA256' --dir /tmp/prev-release 2>/dev/null; then
              OLD_SHA=$(tr -d ' \n' < /tmp/prev-release/CONTENT_SHA256)
            fi
          fi
          echo "old_content_sha=${OLD_SHA:-<none>}"

          if [ -n "$OLD_SHA" ] && [ "$OLD_SHA" = "$NEW_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Content checksum matches latest release — skip publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Content changed (or no prior release) — will publish."
          fi

      - name: Publish / update rolling release "latest"
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TITLE="install-fbsd-desktop ${SHORT_SHA}"
          NOTES="Automated package release from \`${{ github.sha }}\` after full CI passed.

          Content SHA256: \`${{ steps.check.outputs.new_content_sha }}\`

          ## Assets
          - \`installx.sh\` — installer script
          - \`install-fbsd-desktop-*.pkg\` — FreeBSD package
          - \`ports-sysutils-install-fbsd-desktop.tar.gz\` — ports tree fragment
          - \`SHA256SUMS\` / \`CONTENT_SHA256\` — checksums (CONTENT_SHA256 gates re-publish)

          Install example:
          \`\`\`sh
          pkg add -f install-fbsd-desktop-*.pkg
          \`\`\`
          "

          if gh release view latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release delete latest --repo "${{ github.repository }}" --yes --cleanup-tag || true
          fi

          shopt -s nullglob
          PKG_ASSETS=(dist/install-fbsd-desktop-*.pkg)
          if [ ${#PKG_ASSETS[@]} -eq 0 ]; then
            echo "error: no .pkg file in dist/" >&2
            ls -la dist/ >&2
            exit 1
          fi

          gh release create latest \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --notes "$NOTES" \
            --target "${{ github.sha }}" \
            dist/installx.sh \
            dist/ports-sysutils-install-fbsd-desktop.tar.gz \
            dist/SHA256SUMS \
            dist/CONTENT_SHA256 \
            "${PKG_ASSETS[@]}"

          echo "Published release 'latest' for ${SHORT_SHA}"
