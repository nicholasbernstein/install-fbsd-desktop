# Fast static checks (no FreeBSD VM). Runs on every push/PR.

name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-syntax:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check install scripts
        run: |
          set -e
          for f in installx.sh install.sh test_installx.sh; do
            echo "==> bash -n $f"
            bash -n "$f"
          done
          echo "syntax OK"

      - name: FreeBSD release matrix script
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/freebsd-supported-releases.py
          echo "==> live discovery"
          python3 scripts/freebsd-supported-releases.py --github-matrix
          echo "==> fallback-only"
          python3 scripts/freebsd-supported-releases.py --fallback-only --lines
          echo "==> pin"
          python3 scripts/freebsd-supported-releases.py --pin 14.4 --github-matrix
