# Fast static checks (no FreeBSD VM). Runs on every push/PR.

name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-syntax:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check install scripts
        run: |
          set -e
          for f in installx.sh install.sh test_installx.sh; do
            echo "==> bash -n $f"
            bash -n "$f"
          done
          echo "syntax OK"
