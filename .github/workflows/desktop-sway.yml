# Wayland tiling compositor — light enough for push/PR smoke.

name: Desktop / Sway

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "50 7 * * 1"
  workflow_dispatch:

concurrency:
  group: desktop-sway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: Sway
      # installx ignores minimal_xorg for Wayland profiles
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 120
