# Weekly: refresh the offline fallback list of FreeBSD-supported releases.
# Opens a PR when scripts/data/freebsd-releases-fallback.json changes.
# Desktop smoketests also discover releases at runtime; this keeps CI resilient
# if security.freebsd.org is unreachable.

name: Update FreeBSD release fallback

on:
  schedule:
    # Mondays 05:00 UTC — before weekly desktop smokes (06:00+)
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-freebsd-releases
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh fallback release list
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Discover supported FreeBSD releases
        run: |
          set -euo pipefail
          python3 scripts/freebsd-supported-releases.py \
            --write-fallback \
            --github-matrix
          echo "---- fallback file ----"
          cat scripts/data/freebsd-releases-fallback.json

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: |
            chore: refresh FreeBSD supported-release fallback list

            Auto-generated from https://www.freebsd.org/security/#sup
            (intersected with vmactions/freebsd-vm x86_64 images).
          title: "chore: refresh FreeBSD supported-release fallback"
          body: |
            Updates `scripts/data/freebsd-releases-fallback.json` from the
            [FreeBSD supported releases](https://www.freebsd.org/security/#sup)
            table so CI can still build a matrix if live discovery fails.

            Generated by `.github/workflows/update-freebsd-releases.yml`.
          branch: chore/freebsd-releases-fallback
          delete-branch: true
          add-paths: |
            scripts/data/freebsd-releases-fallback.json
