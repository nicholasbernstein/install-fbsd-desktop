# Full desktop environment — PR / weekly / manual (skip plain push).

name: Desktop / Cinnamon

on:
  pull_request:
  schedule:
    - cron: "40 7 * * 1"
  workflow_dispatch:

concurrency:
  group: desktop-cinnamon-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: Cinnamon
      minimal_xorg: false
      mem: "10240"
      timeout_minutes: 180
