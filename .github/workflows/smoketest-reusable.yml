# Reusable FreeBSD desktop install smoketest.
# Called from ci.yml for each desktop. Do not trigger directly.
#
# FreeBSD release matrix is resolved at runtime (job "resolve-releases") from
# https://www.freebsd.org/security/#sup via scripts/freebsd-supported-releases.py,
# intersected with vmactions/freebsd-vm x86_64 images. Pin with inputs.release.

name: Smoketest (reusable)

on:
  workflow_call:
    inputs:
      desktop:
        description: "Desktop key for INSTALLX_DESKTOP (e.g. awesome, KDE, GNOME)"
        required: true
        type: string
      release:
        description: "Optional pin (e.g. 14.4). Empty = all FreeBSD-supported releases"
        required: false
        type: string
        default: ""
      minimal_xorg:
        description: "Install xorg-minimal instead of full xorg"
        required: false
        type: boolean
        default: true
      mem:
        description: "VM memory in MB"
        required: false
        type: string
        default: "8192"
      timeout_minutes:
        description: "Job timeout per matrix cell"
        required: false
        type: number
        default: 120

jobs:
  # -------------------------------------------------------------------------
  # Runs first: build the FreeBSD version matrix for downstream smoke jobs
  # -------------------------------------------------------------------------
  resolve-releases:
    name: Resolve FreeBSD releases
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      releases: ${{ steps.gen.outputs.releases }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate release matrix
        id: gen
        env:
          PIN_RELEASE: ${{ inputs.release }}
        run: |
          set -euo pipefail
          if [ -n "${PIN_RELEASE}" ]; then
            echo "Pinning FreeBSD release: ${PIN_RELEASE}"
            MATRIX=$(python3 scripts/freebsd-supported-releases.py --pin "${PIN_RELEASE}" --github-matrix)
          else
            echo "Discovering FreeBSD-supported releases (security.freebsd.org)…"
            MATRIX=$(python3 scripts/freebsd-supported-releases.py --github-matrix)
          fi
          # Compact single-line JSON for fromJSON()
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          # Human-readable list for logs / optional consumers
          RELEASES=$(python3 -c 'import json,sys; print(" ".join(json.loads(sys.argv[1])["release"]))' "${MATRIX}")
          echo "releases=${RELEASES}" >> "$GITHUB_OUTPUT"
          echo "Resolved matrix: ${MATRIX}"
          echo "Releases: ${RELEASES}"

  # -------------------------------------------------------------------------
  # One VM job per FreeBSD release × desktop
  # -------------------------------------------------------------------------
  smoketest:
    name: ${{ inputs.desktop }} / FreeBSD ${{ matrix.release }}
    needs: resolve-releases
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-releases.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install ${{ inputs.desktop }} on FreeBSD ${{ matrix.release }}
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.release }}
          usesh: true
          mem: ${{ inputs.mem }}
          copyback: true
          prepare: |
            set -e
            export ASSUME_ALWAYS_YES=yes
            export IGNORE_OSVERSION=yes
            pkg update -f
            pkg install -y pkgconf
          run: |
            set -e
            set -x
            export ASSUME_ALWAYS_YES=yes
            export IGNORE_OSVERSION=yes
            cd "$GITHUB_WORKSPACE" 2>/dev/null || cd "$(pwd)"
            freebsd-version
            uname -a

            TESTUSER=nick
            pw groupadd video 2>/dev/null || true
            if ! id "$TESTUSER" >/dev/null 2>&1; then
              pw useradd -n "$TESTUSER" -m -s /bin/sh
            fi
            pw groupmod video -m "$TESTUSER" 2>/dev/null || true
            pw groupmod wheel -m "$TESTUSER" 2>/dev/null || true

            mkdir -p /boot /etc/pkg
            touch /boot/loader.conf
            touch /etc/fstab
            touch /etc/sysctl.conf

            BASE_OPT="load_card_readers load_atapi load_fuse enable_tmpfs enable_async_io enable_workstation_pwr_mgmnt enable_ipfw_firewall"
            if [ "${{ inputs.minimal_xorg }}" = "true" ]; then
              INSTALLX_OPT="$BASE_OPT minimal_xorg"
            else
              INSTALLX_OPT="$BASE_OPT"
            fi

            export CI=true
            export INSTALLX_NONINTERACTIVE=1
            export INSTALLX_USER="$TESTUSER"
            export INSTALLX_DESKTOP="${{ inputs.desktop }}"
            export INSTALLX_ROLLING=yes
            export INSTALLX_EXTRA_PKGS="bash sudo"
            export INSTALLX_GRAPHICS=no
            # Probe sound stack in CI; skip fat audio packages to keep smoke runtime down
            export INSTALLX_AUDIO=yes
            export INSTALLX_AUDIO_PKGS=no
            export INSTALLX_OPT
            export INSTALLX_BASH_SHELL=yes
            export INSTALLX_SUDO_WHEEL=yes

            echo "==== FreeBSD / pkg context ===="
            freebsd-version || true
            uname -a || true
            echo "---- pkg urls ----"
            grep -r url /etc/pkg /usr/local/etc/pkg 2>/dev/null || true
            pkg -vv 2>/dev/null | grep -E 'url|ABI|OSVERSION' | head -n 30 || true

            echo "==== installx.sh desktop=$INSTALLX_DESKTOP release=${{ matrix.release }} ===="
            set +e
            sh ./installx.sh
            install_rc=$?
            set -e
            echo "==== installx.log (tail) ===="
            tail -n 200 installx.log 2>/dev/null || echo "(no installx.log)"
            echo "==== installx.err (tail) ===="
            tail -n 200 installx.err 2>/dev/null || echo "(no installx.err)"
            if [ "$install_rc" -ne 0 ]; then
              echo "installx.sh failed with status $install_rc" >&2
              echo "---- pkg / FATAL lines ----"
              grep -iE 'pkg:|FATAL|No packages|not in catalog|missing|latest|quarterly|kde|plasma' installx.log installx.err 2>/dev/null | tail -n 80 || true
              echo "---- try pkg search kde/plasma6 ----"
              pkg search -q kde 2>/dev/null | head -n 20 || true
              pkg search -q plasma6-plasma 2>/dev/null | head -n 10 || true
              exit "$install_rc"
            fi

            echo "==== shunit2 post-install tests ===="
            set +e
            sh ./test_installx.sh
            test_rc=$?
            set -e
            if [ "$test_rc" -ne 0 ]; then
              echo "shunit2 tests failed with status $test_rc" >&2
              echo "---- /etc/rc.conf ----"
              cat /etc/rc.conf || true
              echo "---- /boot/loader.conf ----"
              cat /boot/loader.conf || true
              echo "---- /etc/fstab ----"
              cat /etc/fstab || true
              echo "---- groups ----"
              grep -E 'video|wheel' /etc/group || true
              exit "$test_rc"
            fi

            echo "==== Smoketest passed: ${{ inputs.desktop }} on FreeBSD ${{ matrix.release }} ===="

      - name: Upload install logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installx-logs-${{ inputs.desktop }}-${{ matrix.release }}-${{ github.run_id }}
          path: |
            installx.log
            installx.err
          if-no-files-found: ignore
