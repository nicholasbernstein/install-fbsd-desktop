name: Desktop / LXQT

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch:

concurrency:
  group: desktop-lxqt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: LXQT
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 150
