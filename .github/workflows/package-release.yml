# Build FreeBSD package + ports tarball; publish a GitHub Release when the
# installable content checksum changes. Runs on every push to main/master.

name: Package and release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: package-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build FreeBSD package
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Build package in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          # Use a current supported release; package is NO_ARCH content
          release: "14.4"
          usesh: true
          copyback: true
          prepare: |
            set -e
            export ASSUME_ALWAYS_YES=yes
            export IGNORE_OSVERSION=yes
            pkg update -f
            pkg install -y pkg
          run: |
            set -e
            set -x
            cd "$GITHUB_WORKSPACE" 2>/dev/null || cd "$(pwd)"
            export INSTALLX_PKG_VERSION=0.2.0
            export INSTALLX_PKG_REVISION="$(echo "${GITHUB_SHA:-unknown}" | cut -c1-7)"
            sh scripts/build-freebsd-pkg.sh "$GITHUB_WORKSPACE/dist"
            ls -la dist
            cat dist/CONTENT_SHA256
            cat dist/SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-package-dist
          path: dist/
          if-no-files-found: error

  release:
    name: Publish GitHub Release if content changed
    needs: build
    runs-on: ubuntu-latest
    # Only publish from the default branch pushes (not forks / random refs)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: freebsd-package-dist
          path: dist

      - name: Compare content checksum to latest release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NEW_SHA=$(tr -d ' \n' < dist/CONTENT_SHA256)
          echo "new_content_sha=${NEW_SHA}"
          echo "new_content_sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"

          OLD_SHA=""
          if gh release view latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            # Prefer CONTENT_SHA256 asset; fall back to parsing body
            if gh release download latest --repo "${{ github.repository }}" \
                 --pattern 'CONTENT_SHA256' --dir /tmp/prev-release 2>/dev/null; then
              OLD_SHA=$(tr -d ' \n' < /tmp/prev-release/CONTENT_SHA256)
            fi
          fi
          echo "old_content_sha=${OLD_SHA:-<none>}"

          if [ -n "$OLD_SHA" ] && [ "$OLD_SHA" = "$NEW_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Content checksum matches latest release — skip publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Content changed (or no prior release) — will publish."
          fi

      - name: Publish / update rolling release "latest"
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TITLE="install-fbsd-desktop ${SHORT_SHA}"
          NOTES="Automated package release from \`${{ github.sha }}\`.

          Content SHA256: \`${{ steps.check.outputs.new_content_sha }}\`

          ## Assets
          - \`installx.sh\` — installer script
          - \`install-fbsd-desktop-*.pkg\` — FreeBSD package (\`pkg add\` / \`pkg install\`)
          - \`ports-sysutils-install-fbsd-desktop.tar.gz\` — ports tree fragment
          - \`SHA256SUMS\` / \`CONTENT_SHA256\` — checksums (CONTENT_SHA256 gates re-publish)

          Install package example:
          \`\`\`sh
          pkg add -f install-fbsd-desktop-*.pkg
          \`\`\`
          "

          # Replace rolling "latest" release when payload content changes
          if gh release view latest --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release delete latest --repo "${{ github.repository }}" --yes --cleanup-tag || true
          fi

          # Expand pkg glob
          shopt -s nullglob
          PKG_ASSETS=(dist/install-fbsd-desktop-*.pkg)
          if [ ${#PKG_ASSETS[@]} -eq 0 ]; then
            echo "error: no .pkg file in dist/" >&2
            ls -la dist/ >&2
            exit 1
          fi

          gh release create latest \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --notes "$NOTES" \
            --target "${{ github.sha }}" \
            dist/installx.sh \
            dist/ports-sysutils-install-fbsd-desktop.tar.gz \
            dist/SHA256SUMS \
            dist/CONTENT_SHA256 \
            "${PKG_ASSETS[@]}"

          echo "Published release 'latest' for ${SHORT_SHA}"
