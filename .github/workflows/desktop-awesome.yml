# Lightweight tiling WM — good default push/PR smoke.

name: Desktop / awesome

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: desktop-awesome-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: awesome
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 120
