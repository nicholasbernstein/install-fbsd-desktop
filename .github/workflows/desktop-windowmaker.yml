name: Desktop / WindowMaker

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "10 6 * * 1"
  workflow_dispatch:

concurrency:
  group: desktop-windowmaker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: WindowMaker
      minimal_xorg: true
      mem: "8192"
      timeout_minutes: 120
