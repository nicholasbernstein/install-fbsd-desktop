# Heavy DE — weekly + manual (+ PR). Skip push to keep default CI lighter.

name: Desktop / KDE

on:
  pull_request:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: desktop-kde-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    uses: ./.github/workflows/smoketest-reusable.yml
    with:
      desktop: KDE
      minimal_xorg: false
      mem: "12288"
      timeout_minutes: 180
